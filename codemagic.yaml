workflows:
  ios-testflight:
    name: Nosh Notes iOS → TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: Personal

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true

    environment:
      groups:
        - ios_signing
      node: 22
      xcode: latest

    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps

      - name: Capacitor sync
        script: |
          [ -d ios ] || npx cap add ios
          mkdir -p out
          npx cap sync ios

      - name: Generate app icons
        script: npx @capacitor/assets generate --ios

      - name: Patch iOS project files
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = com.zbalmuth.noshnotes;/g' "$PBXPROJ"

      - name: Set up manual code signing
        script: |
          keychain initialize
          CERT_PATH="/tmp/certificate.p12"
          printf '%s' "$CM_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          # Convert to legacy format so macOS security framework can read the private key
          BREW_SSL="/opt/homebrew/opt/openssl@3/bin/openssl"
          [ -f "$BREW_SSL" ] || BREW_SSL="/usr/local/opt/openssl@3/bin/openssl"
          if [ -f "$BREW_SSL" ]; then
            $BREW_SSL pkcs12 \
              -in "$CERT_PATH" \
              -passin pass:"$CM_CERTIFICATE_PASSWORD" \
              -passout pass:"$CM_CERTIFICATE_PASSWORD" \
              -export -legacy \
              -out /tmp/cert_legacy.p12 && CERT_PATH="/tmp/cert_legacy.p12"
            echo "=== Brew SSL path: $BREW_SSL ==="
            echo "=== Brew SSL exists: $([ -f "$BREW_SSL" ] && echo YES || echo NO) ==="
            echo "=== Legacy P12 size: $(ls -lh /tmp/cert_legacy.p12 2>/dev/null || echo NOT CREATED) ==="
            echo "=== Valid identities ==="
            security find-identity -v -p codesigning
          fi

          security import "$CERT_PATH" \
            -P "$CM_CERTIFICATE_PASSWORD" \
            -A -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k ""
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_DIR/profile.mobileprovision"
          PROFILE_UUID=$(security cms -D -i "$PROFILE_DIR/profile.mobileprovision" | plutil -extract UUID raw -)
          mv "$PROFILE_DIR/profile.mobileprovision" "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV

      - name: Build iOS IPA
        script: |
          ARCHIVE_PATH="/tmp/App.xcarchive"
          IPA_DIR="/tmp/ipa"
          (cd ios/App && agvtool new-version -all "$BUILD_NUMBER")
          cat > "/tmp/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>9CL2835GC5</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.zbalmuth.noshnotes</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=9CL2835GC5 \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            COMPILER_INDEX_STORE_ENABLE=NO
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$IPA_DIR" \
            -exportOptionsPlist "/tmp/ExportOptions.plist"

    artifacts:
      - /tmp/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
