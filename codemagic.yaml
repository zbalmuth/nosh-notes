workflows:
  ios-testflight:
    name: Nosh Notes iOS → TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: Sous Chefs

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.zbalmuth.noshnotes
      node: 22
      xcode: 16.3

    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps

      - name: Capacitor sync
        script: |
          [ -d ios ] || npx cap add ios
          mkdir -p out
          npx cap sync ios

      - name: Generate app icons
        script: npx @capacitor/assets generate --ios

      - name: Patch iOS project files
        script: |
          # Info.plist — mark app as not using non-exempt encryption (required for App Store)
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"

          # project.pbxproj — set correct bundle ID
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = com.zbalmuth.noshnotes;/g' "$PBXPROJ"

      - name: Build iOS IPA
        script: |
          ARCHIVE_PATH="/tmp/App.xcarchive"
          IPA_DIR="/tmp/ipa"
          (cd ios/App && agvtool new-version -all "$BUILD_NUMBER")
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            COMPILER_INDEX_STORE_ENABLE=NO
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$IPA_DIR" \
            -exportOptionsPlist "$CM_EXPORT_OPTIONS_PATH"

    artifacts:
      - /tmp/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
