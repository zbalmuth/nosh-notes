workflows:
  ios-testflight:
    name: Nosh Notes iOS → TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: Personal

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true

    environment:
      groups:
        - ios_signing
      node: 22
      xcode: 16.3

    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps

      - name: Build web app
        script: |
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          npm run build

      - name: Capacitor sync
        script: |
          [ -f "ios/App/App.xcodeproj/project.pbxproj" ] || npx cap add ios
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '16.0'/" ios/App/Podfile
          npx cap sync ios

      - name: Patch iOS project files
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :ITSAppUsesNonExemptEncryption" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'Used to show your location on the map'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription 'Used to show your location on the map'" "$PLIST"

          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = com.zbalmuth.noshnotes;/g' "$PBXPROJ"

      - name: Inject MyViewController
        script: |
          cp patches/MyViewController.swift ios/App/App/MyViewController.swift
          python3 scripts/ci_register_myviewcontroller.py
          python3 scripts/ci_patch_storyboard.py

      - name: Generate app icons
        script: npx @capacitor/assets generate --ios

      - name: Set up manual code signing
        script: |
          keychain initialize

          printf '%s' "$CM_PRIVATE_KEY" | base64 --decode > /tmp/private.key
          printf '%s' "$CM_CERTIFICATE_CER" | base64 --decode > /tmp/distribution.cer

          BREW_SSL="/opt/homebrew/opt/openssl@3/bin/openssl"
          [ -f "$BREW_SSL" ] || BREW_SSL="/usr/local/opt/openssl@3/bin/openssl"
          echo "=== Using: $BREW_SSL ==="

          $BREW_SSL pkcs12 \
            -export -legacy \
            -inkey /tmp/private.key \
            -in /tmp/distribution.cer \
            -out /tmp/certificate.p12 \
            -passout pass:"$CM_CERTIFICATE_PASSWORD"

          echo "=== P12 created: $(ls -lh /tmp/certificate.p12) ==="

          security import /tmp/certificate.p12 \
            -P "$CM_CERTIFICATE_PASSWORD" \
            -A -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k ""
          echo "=== Valid identities ==="
          security find-identity -v -p codesigning

          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_DIR/profile.mobileprovision"
          PROFILE_UUID=$(security cms -D -i "$PROFILE_DIR/profile.mobileprovision" | plutil -extract UUID raw -)
          mv "$PROFILE_DIR/profile.mobileprovision" "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV

      - name: Build iOS IPA
        script: |
          ARCHIVE_PATH="/tmp/App.xcarchive"
          IPA_DIR="/tmp/ipa"
          (cd ios/App && agvtool new-version -all "$BUILD_NUMBER")
          cat > "/tmp/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>9CL2835GC5</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.zbalmuth.noshnotes</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=9CL2835GC5 \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            COMPILER_INDEX_STORE_ENABLE=NO
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$IPA_DIR" \
            -exportOptionsPlist "/tmp/ExportOptions.plist"

    artifacts:
      - /tmp/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
