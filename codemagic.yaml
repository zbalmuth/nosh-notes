workflows:
  ios-distribution:
    name: Nosh Notes → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        # Contains: CM_CERTIFICATE, CM_CERTIFICATE_PASSWORD, CM_PROVISIONING_PROFILE
        - ios_signing
      vars:
        BUNDLE_ID: com.zbalmuth.noshnotes
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: v22
      xcode: latest

    integrations:
      app_store_connect: Sous Chefs   # your existing ASC API key integration

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Add iOS platform (only on first run; skipped if ios/ is already committed)
        script: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi
          # Ensure the dist stub exists so cap sync doesn't warn on a live-URL build
          mkdir -p dist

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Patch Info.plist – usage descriptions
        script: |
          PLIST="ios/App/App/Info.plist"
          # Camera
          /usr/libexec/PlistBuddy -c \
            "Add :NSCameraUsageDescription string 'Used to photograph food'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c \
            "Set :NSCameraUsageDescription 'Used to photograph food'" "$PLIST"
          # Photo library read
          /usr/libexec/PlistBuddy -c \
            "Add :NSPhotoLibraryUsageDescription string 'Used to select food photos'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c \
            "Set :NSPhotoLibraryUsageDescription 'Used to select food photos'" "$PLIST"
          # Photo library write
          /usr/libexec/PlistBuddy -c \
            "Add :NSPhotoLibraryAddUsageDescription string 'Used to save food photos'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c \
            "Set :NSPhotoLibraryAddUsageDescription 'Used to save food photos'" "$PLIST"

      - name: Set up keychain
        script: keychain initialize

      - name: Install provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          PROFILE_PATH="$(mktemp "$PROFILES_HOME"/$(uuidgen).mobileprovision)"
          echo "${CM_PROVISIONING_PROFILE}" | base64 --decode > "$PROFILE_PATH"
          echo "Installed provisioning profile: $PROFILE_PATH"

      - name: Install signing certificate
        script: |
          echo "${CM_CERTIFICATE}" | base64 --decode > /tmp/cert.p12
          keychain add-certificates \
            --certificate /tmp/cert.p12 \
            --certificate-password "${CM_CERTIFICATE_PASSWORD}"

      - name: Apply profiles & build IPA
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration          # uses the "Sous Chefs" integration above
        submit_to_testflight: true
